<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WAVELENGTH</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0e0e18;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    height: 100dvh;
    gap: 0;
    padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
  }

  #cv {
    display: block;
    border-radius: 18px;
    touch-action: none;
    cursor: pointer;
    flex-shrink: 0;
  }

  #btns {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    margin-top: 10px;
    padding: 0 12px;
  }

  .btn {
    flex: 1;
    padding: 0;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.06em;
    transition: background 0.08s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    /* height set via JS */
  }

  .btn:active, .btn.pressed {
    background: rgba(255,255,255,0.2);
    transform: scale(0.96);
  }

  #bc {
    background: rgba(55, 138, 221, 0.25);
    border-color: rgba(55, 138, 221, 0.5);
  }
  #bc:active, #bc.pressed {
    background: rgba(55, 138, 221, 0.5);
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="btns">
    <button class="btn" id="bl">◀ ЛЕВО</button>
    <button class="btn" id="bc">◈ ЦВЕТ</button>
    <button class="btn" id="br">ПРАВО ▶</button>
  </div>
</div>

<script>
(function(){
'use strict';

// ─── Canvas + sizing ────────────────────────────────────────────────
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('wrap');
const btns = document.getElementById('btns');
const btnL = document.getElementById('bl');
const btnC = document.getElementById('bc');
const btnR = document.getElementById('br');

const IW = 320, IH = 520; // logical resolution
let dpr = 1, scl = 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  // available space
  const safeT = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat') || 0) || 0;
  const safeB = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab') || 0) || 0;
  const winW = window.innerWidth;
  const winH = window.innerHeight;

  // button row height: ~14% of screen, min 60px, max 90px
  const btnH = Math.min(90, Math.max(60, Math.floor(winH * 0.13)));
  const btnMT = 10;
  btns.style.width = winW + 'px';
  btns.style.paddingLeft = '12px';
  btns.style.paddingRight = '12px';
  [btnL, btnC, btnR].forEach(b => b.style.height = btnH + 'px');

  // canvas area
  const availH = winH - btnH - btnMT - 20;
  const availW = winW - 24;
  scl = Math.min(availW / IW, availH / IH);

  const dispW = Math.floor(IW * scl);
  const dispH = Math.floor(IH * scl);
  cv.style.width  = dispW + 'px';
  cv.style.height = dispH + 'px';
  cv.width  = Math.round(dispW * dpr);
  cv.height = Math.round(dispH * dpr);
  ctx.setTransform(scl * dpr, 0, 0, scl * dpr, 0, 0);
}

resize();
window.addEventListener('resize', resize);

// ─── Game constants ──────────────────────────────────────────────────
const COLS   = ['#E24B4A', '#4aaa5a', '#378ADD'];
const CNAMES = ['RED', 'GRN', 'BLU'];
const CFILL  = ['rgba(226,75,74,0.07)', 'rgba(74,170,90,0.07)', 'rgba(55,138,221,0.07)'];
const NL = 3;
const LW = IW / NL;
const LX = l => LW * l + LW / 2;
const PY = IH - 74;
const PR = 17;

let hi = 0;
let g  = mk();

function mk() {
  return {
    phase: 'start', pLane: 1, pColor: 0, pX: LX(1),
    lives: 3, score: 0, spd: 2.4, obs: [], parts: [],
    frame: 0, spwnT: 0, spwnI: 85, flash: 0, flashCol: '',
    hiScore: hi, colorAnim: 0
  };
}

function mvLane(d) {
  if (g.phase !== 'play') return;
  const prev = g.pLane;
  g.pLane = Math.max(0, Math.min(NL - 1, g.pLane + d));
}

function cycClr() {
  if (g.phase !== 'play') return;
  g.pColor = (g.pColor + 1) % COLS.length;
  g.colorAnim = 8;
}

function startG() {
  hi = g.hiScore;
  g = mk();
  g.hiScore = hi;
  g.phase = 'play';
}

// ─── Keyboard ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','Space','KeyA','KeyD','KeyX'].includes(e.code)) e.preventDefault();
  if (g.phase !== 'play') { startG(); return; }
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') mvLane(-1);
  if (e.code === 'ArrowRight' || e.code === 'KeyD') mvLane(1);
  if (e.code === 'Space'      || e.code === 'KeyX') cycClr();
});

// ─── Touch on canvas ─────────────────────────────────────────────────
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  if (g.phase !== 'play') { startG(); return; }
  const t = e.changedTouches[0];
  const r = cv.getBoundingClientRect();
  const tx = (t.clientX - r.left) / r.width * IW;
  if      (tx < IW / 3)     mvLane(-1);
  else if (tx > IW * 2 / 3) mvLane(1);
  else                       cycClr();
}, { passive: false });

cv.addEventListener('click', () => { if (g.phase !== 'play') startG(); });

// ─── Buttons — use touchstart to skip 300ms delay ────────────────────
function addBtn(el, action) {
  function go(e) {
    e.preventDefault();
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 120);
    if (g.phase !== 'play') startG();
    else action();
  }
  el.addEventListener('touchstart', go, { passive: false });
  el.addEventListener('click', go);   // fallback desktop
}

addBtn(btnL, () => mvLane(-1));
addBtn(btnC, () => cycClr());
addBtn(btnR, () => mvLane(1));

// ─── Spawn ───────────────────────────────────────────────────────────
function spwnObs() {
  const lane  = Math.floor(Math.random() * NL);
  const color = Math.floor(Math.random() * COLS.length);
  g.obs.push({ x: LX(lane), y: -36, lane, color, w: 50, h: 38, phased: false, hit: false, phasedAlpha: 1 });
}

function spwnParts(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    g.parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, color, life: 32+Math.random()*18, maxLife: 50, r: 2+Math.random()*4 });
  }
}

// ─── Update ──────────────────────────────────────────────────────────
function update() {
  if (g.phase !== 'play') return;
  g.frame++;
  g.score++;
  if (g.frame % 300 === 0) { g.spd += 0.2; g.spwnI = Math.max(45, g.spwnI - 3); }
  g.pX += (LX(g.pLane) - g.pX) * 0.22;
  g.spwnT++;
  if (g.spwnT >= g.spwnI) { spwnObs(); g.spwnT = 0; }
  g.flash    = Math.max(0, g.flash - 1);
  g.colorAnim = Math.max(0, g.colorAnim - 1);

  for (const o of g.obs) {
    o.y += g.spd;
    if (o.phased) o.phasedAlpha = Math.max(0.12, o.phasedAlpha - 0.045);
    const dx = Math.abs(g.pX - o.x);
    const dy = Math.abs(PY - o.y);
    if (dx < PR + o.w/2 - 6 && dy < PR + o.h/2 - 6) {
      if (g.pColor === o.color) {
        if (!o.phased) {
          o.phased = true;
          g.score += 500;
          g.flash = 14; g.flashCol = COLS[g.pColor];
          spwnParts(g.pX, PY, COLS[g.pColor], 18);
        }
      } else {
        if (!o.hit && !o.phased) {
          o.hit = true;
          g.lives--;
          g.flash = 14; g.flashCol = '#E24B4A';
          spwnParts(g.pX, PY, '#888', 18);
          if (g.lives <= 0) { g.hiScore = Math.max(g.hiScore, g.score); g.phase = 'dead'; }
        }
      }
    }
  }
  g.obs   = g.obs.filter(o => o.y - o.h/2 < IH + 24);
  for (const p of g.parts) { p.x += p.vx; p.y += p.vy; p.vx *= 0.92; p.vy *= 0.92; p.life--; }
  g.parts = g.parts.filter(p => p.life > 0);
}

// ─── Draw helpers ─────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ─── Draw ─────────────────────────────────────────────────────────────
function draw() {
  // BG
  ctx.fillStyle = '#10101e';
  ctx.fillRect(0, 0, IW, IH);

  // Lane tints
  for (let i = 0; i < NL; i++) {
    ctx.fillStyle = CFILL[i];
    ctx.fillRect(LW*i, 0, LW, IH);
  }

  // Lane dividers
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 8]);
  for (let i = 1; i < NL; i++) {
    ctx.beginPath(); ctx.moveTo(LW*i, 0); ctx.lineTo(LW*i, IH); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Lane color labels top
  if (g.phase === 'play') {
    for (let i = 0; i < NL; i++) {
      ctx.fillStyle = COLS[i] + 'cc';
      ctx.font = 'bold 9px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(CNAMES[i], LX(i), 18);
    }
  }

  // Flash overlay
  if (g.flash > 0) {
    const alpha = Math.floor((g.flash / 14) * 50).toString(16).padStart(2, '0');
    ctx.fillStyle = (g.flashCol || '#ffffff') + alpha;
    ctx.fillRect(0, 0, IW, IH);
  }

  // Particles
  for (const p of g.parts) {
    ctx.globalAlpha = (p.life / p.maxLife) * 0.85;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Obstacles
  for (const o of g.obs) {
    const a = o.phased ? o.phasedAlpha : 1;
    ctx.globalAlpha = a;
    // shadow
    ctx.fillStyle = COLS[o.color] + '20';
    rr(o.x-o.w/2+2, o.y-o.h/2+4, o.w, o.h, 9);
    ctx.fill();
    // block
    ctx.fillStyle = o.phased ? COLS[o.color] + '33' : COLS[o.color];
    rr(o.x-o.w/2, o.y-o.h/2, o.w, o.h, 9);
    ctx.fill();
    if (!o.phased) {
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.globalAlpha = o.phased ? 0.2 : 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(CNAMES[o.color], o.x, o.y + 4);
  }
  ctx.globalAlpha = 1;

  // Player
  if (g.phase === 'play') {
    const col = COLS[g.pColor];
    // outer aura (pulse on color change)
    const auraR = PR + 14 + (g.colorAnim > 0 ? g.colorAnim * 1.2 : 0);
    ctx.fillStyle = col + '20';
    ctx.beginPath(); ctx.arc(g.pX, PY, auraR, 0, Math.PI*2); ctx.fill();
    // inner glow
    ctx.fillStyle = col + '40';
    ctx.beginPath(); ctx.arc(g.pX, PY, PR + 6, 0, Math.PI*2); ctx.fill();
    // player circle
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(g.pX, PY, PR, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(g.pX, PY, PR, 0, Math.PI*2); ctx.stroke();
    // label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(CNAMES[g.pColor], g.pX, PY + 3.5);
  }

  // HUD bottom bar
  if (g.phase === 'play' || g.phase === 'dead') {
    // lives
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i < g.lives ? '#E24B4A' : '#333355';
      ctx.beginPath(); ctx.arc(18 + i*22, IH - 18, 7, 0, Math.PI*2); ctx.fill();
      if (i < g.lives) {
        ctx.fillStyle = 'rgba(255,100,100,0.4)';
        ctx.beginPath(); ctx.arc(18 + i*22, IH - 18, 10, 0, Math.PI*2); ctx.fill();
      }
    }
    // score
    ctx.fillStyle = '#e0e0ff';
    ctx.font = 'bold 15px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.floor(g.score / 10), IW - 12, IH - 12);
    // speed
    ctx.fillStyle = '#555588';
    ctx.font = '9px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SPD ' + g.spd.toFixed(1), IW - 12, 16);
  }

  // ── START screen ──
  if (g.phase === 'start') {
    ctx.fillStyle = 'rgba(14,14,28,0.94)';
    ctx.fillRect(0, 0, IW, IH);
    ctx.textAlign = 'center';

    ctx.fillStyle = '#378ADD';
    ctx.font = 'bold 28px "Courier New", monospace';
    ctx.fillText('WAVELENGTH', IW/2, IH/2 - 120);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px "Courier New", monospace';
    ctx.fillText('блоки падают сверху', IW/2, IH/2 - 90);
    ctx.fillText('совпади по цвету — пройди насквозь', IW/2, IH/2 - 72);
    ctx.fillText('не тот цвет — теряешь жизнь', IW/2, IH/2 - 54);

    // color demo
    [['#E24B4A','RED'],['#4aaa5a','GRN'],['#378ADD','BLU']].forEach(([c,l],i) => {
      const x = IW/2 - 64 + i*64;
      ctx.fillStyle = c + '33';
      ctx.beginPath(); ctx.arc(x, IH/2+8, 20, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.arc(x, IH/2+8, 16, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(l, x, IH/2+12);
    });

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '10px "Courier New", monospace';
    ctx.fillText('◀ ▶  дорожка   |   ◈  цвет', IW/2, IH/2 + 60);

    // play button
    ctx.fillStyle = '#378ADD';
    rr(IW/2-70, IH/2+90, 140, 46, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▶  ИГРАТЬ', IW/2, IH/2 + 119);
  }

  // ── DEAD screen ──
  if (g.phase === 'dead') {
    ctx.fillStyle = 'rgba(14,14,28,0.91)';
    ctx.fillRect(0, 0, IW, IH);
    ctx.textAlign = 'center';

    ctx.fillStyle = '#E24B4A';
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillText('СИГНАЛ ПОТЕРЯН', IW/2, IH/2 - 70);

    ctx.fillStyle = '#e0e0ff';
    ctx.font = 'bold 22px "Courier New", monospace';
    ctx.fillText('СЧЁТ  ' + Math.floor(g.score/10), IW/2, IH/2 - 28);

    ctx.fillStyle = '#556688';
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('ЛУЧШИЙ  ' + Math.floor(g.hiScore/10), IW/2, IH/2 + 2);

    ctx.fillStyle = '#378ADD';
    rr(IW/2-70, IH/2+44, 140, 46, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▶  ЕЩЁ РАЗ', IW/2, IH/2 + 73);
  }

  ctx.textAlign = 'left';
}

// ─── Loop ─────────────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

})();
</script>
</body>
</html>
